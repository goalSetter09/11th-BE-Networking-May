spring:
  application:
    name: backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_PATH}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false

swagger:
  url: ${SWAGGER_URL}

airkorea:
  dust-url: ${DUST_URL}
  station-url: ${STATION_URL}
  service-key: ${AIRKOREA_SERVICE_KEY}   # 환경변수에서 주입